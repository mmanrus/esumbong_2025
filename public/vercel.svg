<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Teal rounded background -->
  <rect width="32" height="32" rx="7" fill="#2a9d8f"/>

  <!-- Dark teal "E" letter -->
  <text
    x="7"
    y="23"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="20"
    fill="#1a6b62"
    letter-spacing="-1"
  >E</text>

  <!-- Yellow speech bubble (positioned top-right) -->
  <g transform="translate(17, 3)">
    <!-- Bubble body -->
    <rect x="0" y="0" width="13" height="13" rx="3.5" fill="#f4c430"/>
    <!-- Bubble tail pointing bottom-left -->
    <polygon points="2,12 0,16 6,12" fill="#f4c430"/>
    <!-- Exclamation mark - stem -->
    <rect x="5.5" y="2.5" width="2" height="6" rx="1" fill="#1a3a5c"/>
    <!-- Exclamation mark - dot -->
    <circle cx="6.5" cy="10.5" r="1.1" fill="#1a3a5c"/>
  </g>
</svg>
